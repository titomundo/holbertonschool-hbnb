<!doctype html>
<html lang="en">

<head>

  <title>List of Places</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="layout">
    <header>
      <nav>
        <ul class="navbar">
          <li>
            <a href="index.html">
              <img class="img" width="100" src="images/logo.png" alt="HBnB Logo" />
            </a>
          </li>
          <li>
            <a href="login.html" id="login-link">Login</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <h1>Available Places</h1>

      </section>
      <section id="places-list">
        <ul>

          </li>
          <li>
            <div class="card shadow">
              <h3>Name:</h3>
              <p>Price per night:</p>

            </div>
          </li>
          <li>
            <div class="card shadow">
              <h3>Name:</h3>
              <p>Price per night:</p>
              <button>See details</button>
            </div>
          </li>
          <li>
            <div class="card shadow">
              <h3>Name:</h3>
              <p>Price per night:</p>
              <button>See details</button>
            </div>
          </li>
          <!-- List of places will be populated dynamically -->
        </ul>
      </section>
    </main>
    <footer>
      <p>2026 HBnB. All Rights Reserved.</p>
    </footer>
  </div>
  <script src="scripts.js"></script>
</body>

</html>
